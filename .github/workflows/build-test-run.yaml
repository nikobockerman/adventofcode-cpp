name: Build, test and run
on:
  push:
    branches:
      - vcpkg-to-conan
  pull_request:
    paths:
      - "**.cpp"
      - "**.hpp"
      - "**/CMakeLists.txt"
      - ".github/actions/cmake-project-setup/**"
      - ".github/workflows/build-test-run.yaml"
      - ".github/CMakeUserPresets.json"
      - "aoc/**/input-*.txt"
      - "CMakePresets.json"
      - "conanfile.txt"
  workflow_call:
  workflow_dispatch:
permissions:
  contents: read

jobs:
  build-test-run:
    strategy:
      matrix:
        include:
          # MSVC
          #- os: windows-latest
          #  workflowPreset: ci-msvc-debug
          #  aocBinPath: ""
          #- os: windows-latest
          #  workflowPreset: ci-msvc-release
          #  aocBinPath: build/msvc/aoc/aoc/Release/aoc.exe
          # Clang on Windows
          #- os: windows-latest
          #  workflowPreset: ci-clang-windows-debug
          #  aocBinPath: ""
          #- os: windows-latest
          #  workflowPreset: ci-clang-windows-release
          #  aocBinPath: build/clang-release/aoc/aoc/aoc.exe

          # Clang on Linux
          - name: Linux Clang Release
            os: ubuntu-24.04
            conanProfileHost: ubuntu-clang-release
            workflowPreset: ci-release-gcc-clang
            aocBinPath: build/Release/aoc/aoc/aoc
          - name: Linux Clang Debug
            os: ubuntu-24.04
            conanProfileHost: ubuntu-clang-debug
            workflowPreset: ci-debug-gcc-clang
            aocBinPath: build/Debug/aoc/aoc/aoc

          # Gcc 14 on Linux
          - name: Linux GCC 14 Release
            os: ubuntu-24.04
            conanProfileHost: ubuntu-gcc-14-release
            workflowPreset: ci-release-gcc-clang
            aocBinPath: build/Release/aoc/aoc/aoc
          - name: Linux GCC 14 Debug
            os: ubuntu-24.04
            conanProfileHost: ubuntu-gcc-14-debug
            workflowPreset: ci-debug-gcc-clang
            aocBinPath: build/Debug/aoc/aoc/aoc

    name: ${{matrix.name}} - Build + test + run
    runs-on: ${{matrix.os}}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: DEBUG
        if: matrix.os == 'ubuntu-24.04'
        run: |
          which g++-14
          which clang++
          clang++ --version
      - name: Setup CMake project
        uses: ./.github/actions/cmake-project-setup
        with:
          conanProfileHost: ${{matrix.conanProfileHost}}
      - name: DEBUG
        run: |
          cmake --list-presets
          cmake --workflow --list-presets
      - name: Run CMake workflow
        uses: lukka/run-cmake@af1be47fd7c933593f687731bc6fdbee024d3ff4 # v10.8
        with:
          workflowPreset: "${{matrix.workflowPreset}}"
      - name: Run aoc
        if: matrix.aocBinPath
        run: ./"${{matrix.aocBinPath}}"
